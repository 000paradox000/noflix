[tool.ruff]
line-length = 79
target-version = "py314"

[tool.ruff.lint]
# Enabled rule groups:
# E    = pycodestyle errors (PEP 8 style issues)
# F    = Pyflakes (unused imports, undefined names, logic mistakes)
# B    = flake8-bugbear (likely bugs and risky patterns)
# I    = isort (import sorting and grouping)
# UP   = pyupgrade (modernize syntax for target Python version)
# SIM  = flake8-simplify (suggest simpler, cleaner code)
select = ["E", "F", "B", "I", "UP", "SIM"]

[tool.ruff.lint.per-file-ignores]
# E501 = line too long
# F403 = unable to detect undefined names
# F405 = may be undefined, or defined from star imports

# Ignore long-line warnings in settings files,
# where environment variables or long config values are common.
"config/settings/*.py" = ["E501", "F403", "F405"]

# Ignore long-line warnings in autogenerated migration files.
# These files are machine-generated and should rarely be edited manually.
"migrations/*.py" = ["E501"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"

[tool.bandit]
exclude_dirs = [
    "tests",
    "migrations",
    ".venv",
    "config/settings/original.py",
]

[tool.coverage.run]
omit = [
    "manage.py",
]
